  var s=D.summary;
  // 计算 table2 中所有分类的关键词总数
  var totalKeywords=0;
  Object.keys(D.table2_keyword_detail_by_category).forEach(function(c){
    totalKeywords+=(D.table2_keyword_detail_by_category[c]||[]).length;
  });
  // 找出关键词数量最多的需求
  var topDemand={category:'-', count:0, pct:0};
  Object.keys(D.table2_keyword_detail_by_category).forEach(function(c){
    var cnt=(D.table2_keyword_detail_by_category[c]||[]).length;
    if(cnt>topDemand.count){
      topDemand={category:c, count:cnt, pct:totalKeywords>0?(cnt/totalKeywords*100):0};
    }
  });
  document.getElementById('sc').innerHTML=
    '<div class="card"><div class="card-label">关键词总数</div><div class="card-value">'+totalKeywords+'</div><div class="card-sub">共 '+s.rawRecords+' 条原始数据</div></div>'
   +'<div class="card"><div class="card-label">需求维度数</div><div class="card-value">'+D.table3_demand_stats.length+'</div><div class="card-sub">8大标准维度</div></div>'
   +'<div class="card"><div class="card-label">统计天数</div><div class="card-value">'+s.days+'</div><div class="card-sub">'+s.dateRange+'</div></div>'
   +'<div class="card"><div class="card-label">'+topDemand.category+'占比</div><div class="card-value">'+topDemand.pct.toFixed(1)+'%</div><div class="card-sub">关键词数 '+topDemand.count+' / 共 '+totalKeywords+'</div></div>';
}

function rt1(){
  var h='';
  D.table1_keyword_analysis.forEach(function(r){
    h+='<tr><td class="tc">'+r.rank+'</td><td>'+r.keyword+'</td>'
      +'<td class="tr">'+fn(r.searchIndex)+'</td>'
      +'<td class="tr">'+r.clickRate.toFixed(2)+'%</td>'
      +'<td class="tr">'+r.payConversionRate.toFixed(2)+'%</td>'
      +'<td>'+r.tags.map(tag).join('')+'</td>'
      +'<td class="rsn">'+r.reasoning+'</td></tr>';
  });
  document.getElementById('b1').innerHTML=h;
}

function ist(){
  var cats=Object.keys(D.table2_keyword_detail_by_category);
  // 按关键词数量降序排序
  cats.sort(function(a,b){
    return (D.table2_keyword_detail_by_category[b]||[]).length - (D.table2_keyword_detail_by_category[a]||[]).length;
  });
  var h='';
  var activeCats=[];
  cats.forEach(function(c){
    var cnt=D.table2_keyword_detail_by_category[c].length;
    if(cnt>0){
      activeCats.push(c);
      h+='<button class="sub-tab'+(activeCats.length===1?' active':'')+'" onclick="sst(\''+c+'\',this)">'+c+' ('+cnt+')</button>';
    }
  });
  document.getElementById('st').innerHTML=h;
  if(activeCats.length)rt2(activeCats[0]);
}

function sst(cat,btn){
  document.querySelectorAll('.sub-tab').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  rt2(cat);
}

function rt2(cat){
  var rows=D.table2_keyword_detail_by_category[cat]||[];
  document.getElementById('t2info').textContent=cat+' — 共 '+rows.length+' 个关键词，按搜索指数降序';
  var h='';
  rows.forEach(function(r){
    h+='<tr><td class="tc">'+r.subRank+'</td><td>'+r.keyword+'</td>'
      +'<td class="tr">'+fn(r.searchIndex)+'</td>'
      +'<td class="tr">'+r.clickRate.toFixed(2)+'%</td>'
      +'<td class="tr">'+r.payConversionRate.toFixed(2)+'%</td></tr>';
  });
  document.getElementById('b2').innerHTML=h;
}

function rt3(){
  var h='';
  D.table3_demand_stats.forEach(function(r){
    h+='<tr><td>'+r.category+'</td><td class="tr">'+r.keywordCount+'</td>'
      +'<td class="tr">'+fn(r.searchTotal)+'</td><td class="tr">'+r.searchPct+'%</td><td class="tr">'+fn(r.searchDailyAvg)+'</td>'
      +'<td class="tr">'+fn(r.clickTotal)+'</td><td class="tr">'+r.clickPct+'%</td><td class="tr">'+fn(r.clickDailyAvg)+'</td>'
      +'<td class="tr">'+fn(r.payTotal)+'</td><td class="tr">'+r.payPct+'%</td><td class="tr">'+fn(r.payDailyAvg)+'</td>'
      +'<td class="tr">'+r.clickRate.toFixed(2)+'%</td>'
      +'<td class="tr">'+r.payConversionRate.toFixed(2)+'%</td></tr>';
  });
  document.getElementById('b3').innerHTML=h;
}

function sw(id,btn){
  document.querySelectorAll('.tab-content').forEach(function(e){e.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(b){b.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='t1')rt1();
  if(id==='t2')ist();
  if(id==='t3')rt3();
}

document.addEventListener('DOMContentLoaded',function(){rsc();rt1();ist();rt3();});
</script>


</body></html>
